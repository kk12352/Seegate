<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seegate Product | Seegate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="style.css">

<body>
  <header>
    <div class="container header-inner">
      <a class="brand" href="index.html"><img class="brand-logo" src="assets/seegate-logo.png" alt="Seegate logo"><div><div class="brand-name">Seegate</div><div class="brand-sub" data-i18n="brandSub">Clarity Moves Everything</div></div></a>
